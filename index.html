<!doctype html>
<html lang="zh-CN" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#F6F4EF" />
    <meta name="theme-color" content="#121110" media="(prefers-color-scheme: dark)" />
    <script>
      // Theme guard：在样式表生效前把 [data-theme] 落上去，避免 FOUC
      (function () {
        try {
          var saved = localStorage.getItem("webpaint.theme");
          if (saved === "day" || saved === "night" || saved === "auto") {
            document.documentElement.setAttribute("data-theme", saved);
          }
        } catch (_) {}
      })();
      // iPad 没 devtools — 任何脚本错误顶上糊一条红条，方便远程诊断
      (function () {
        function show(text) {
          var bar = document.getElementById("__errBar");
          if (!bar) {
            bar = document.createElement("div");
            bar.id = "__errBar";
            bar.style.cssText = "position:fixed;left:0;right:0;top:0;z-index:9999;padding:8px 12px;background:#c0392b;color:#fff;font:13px/1.4 system-ui;white-space:pre-wrap;word-break:break-word;max-height:50vh;overflow:auto";
            bar.addEventListener("click", function () { bar.remove(); });
            (document.body || document.documentElement).appendChild(bar);
          }
          bar.textContent = "⚠ " + text + "  (点击关闭)";
        }
        window.__wp_showFatal = show;
        window.addEventListener("error", function (e) {
          var m = (e && e.message) || (e && e.error && (e.error.message || String(e.error))) || "脚本错误";
          var src = e && e.filename ? " (" + e.filename.split("/").pop() + ":" + e.lineno + ")" : "";
          show(m + src);
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e && e.reason;
          show((r && r.message) || String(r || "promise rejection"));
        });
      })();
    </script>
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WebPaint" />
    <title>WebPaint</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="icon" href="./icon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180.png" />
    <link rel="stylesheet" href="./src/styles.css" />
    <!-- 版本号 SSoT；service-worker.js 也 importScripts 同一份 -->
    <script src="./src/version.js"></script>
  </head>
  <body>
    <canvas id="board" class="board" aria-label="paint canvas"></canvas>

    <!-- 顶栏：工具 + 颜色 + 笔粗 + undo / redo / fit / 主题 -->
    <header class="top-bar" id="topBar">
      <div class="tool-group" role="group" aria-label="tools">
        <button class="tool" id="toolPen" type="button" data-tool="brush" aria-pressed="true" title="笔刷 (B)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 4l6 6-9 9H5v-6l9-9z"></path>
            <path d="M13 5l6 6"></path>
          </svg>
        </button>
        <button class="tool" id="toolEraser" type="button" data-tool="eraser" title="橡皮 (E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 20H7L3 16a2 2 0 0 1 0-2.83l9-9a2 2 0 0 1 2.83 0l5.17 5.17a2 2 0 0 1 0 2.83L11 21"></path>
            <path d="M14 7l3 3"></path>
          </svg>
        </button>
        <button class="tool" id="toolPicker" type="button" data-tool="picker" title="吸色 (Alt 临时)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <!-- 滴管头：菱形，4 个角 (13,11) (17,7) (21,11) (17,15) -->
            <path d="M13 11l4-4 4 4-4 4z"></path>
            <!-- 管 + 液滴尖：(3,21)→(5,21)→(5,19)→(13,11)；终点 (13,11) 正好接菱形左下角 -->
            <path d="M3 21h2v-2l8-8"></path>
          </svg>
        </button>
        <button class="tool" id="toolHand" type="button" data-tool="hand" title="平移 (H / Space)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 11V6a2 2 0 0 0-4 0v5"></path>
            <path d="M14 10V4a2 2 0 0 0-4 0v6"></path>
            <path d="M10 10.5V6a2 2 0 0 0-4 0v9"></path>
            <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-1-5.6-2.8l-3.4-5.4a2 2 0 0 1 3.4-2L8 14"></path>
          </svg>
        </button>
      </div>

      <div class="color-group" role="group" aria-label="color">
        <button class="swatch active-color" id="activeSwatch" title="颜色 (C)"></button>
      </div>

      <label class="num-group" title="笔粗">
        <span class="num-label">粗</span>
        <input id="sizeSlider" type="range" min="1" max="200" step="1" value="12" aria-label="笔粗" />
      </label>

      <label class="num-group" title="不透明度">
        <span class="num-label">透</span>
        <input id="opacitySlider" type="range" min="1" max="100" step="1" value="100" aria-label="不透明度" />
      </label>

      <div class="spacer"></div>

      <button class="tool" id="undoButton" type="button" title="撤销 (Ctrl+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 14 4 9 9 4"></polyline>
          <path d="M20 20v-7a4 4 0 0 0-4-4H4"></path>
        </svg>
      </button>
      <button class="tool" id="redoButton" type="button" title="重做 (Ctrl+Shift+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 14 20 9 15 4"></polyline>
          <path d="M4 20v-7a4 4 0 0 1 4-4h12"></path>
        </svg>
      </button>

      <button class="tool" id="fitButton" type="button" title="适应画布 (0)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="1"></rect>
          <path d="M3 8h4M3 16h4M8 3v4M16 3v4M3 8L8 3M3 16l5 5M21 8L16 3M21 16l-5 5"></path>
        </svg>
      </button>

      <button class="tool" id="menuButton" type="button" title="菜单" aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="4" y1="7" x2="20" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="20" y2="17"></line>
        </svg>
      </button>
    </header>

    <!-- 汉堡菜单：低频开关 / 操作。后续 .ora 导入导出、新建分辨率也放这里。 -->
    <div class="menu-panel hidden" id="menuPanel" role="menu">
      <button class="menu-item" id="menuPressureSize" type="button" role="menuitemcheckbox" aria-pressed="true">
        <span class="menu-item-label">压感 → 粗细</span>
        <span class="menu-item-state" data-state-for="pressureSize">开</span>
      </button>
      <button class="menu-item" id="menuPressureOpacity" type="button" role="menuitemcheckbox" aria-pressed="true">
        <span class="menu-item-label">压感 → 透明度</span>
        <span class="menu-item-state" data-state-for="pressureOpacity">开</span>
      </button>
      <hr class="menu-sep" />
      <button class="menu-item" id="menuLongPressPick" type="button" role="menuitemcheckbox" aria-pressed="false">
        <span class="menu-item-label">单指长按吸色</span>
        <span class="menu-item-state" data-state-for="longPressPick">关</span>
      </button>
      <hr class="menu-sep" />
      <button class="menu-item" id="menuTheme" type="button" role="menuitem">
        <span class="menu-item-label">主题</span>
        <span class="menu-item-state" data-state-for="theme">跟随系统</span>
      </button>
      <button class="menu-item menu-danger" id="menuClear" type="button" role="menuitem">
        <span class="menu-item-label">清空画布</span>
      </button>
    </div>

    <!-- HUD：缩放 / 画布尺寸 / 状态 / 版本水印 -->
    <div class="hud" id="hud">
      <span id="zoomLabel">100%</span>
      <span class="sep" aria-hidden="true">·</span>
      <span id="canvasSizeLabel">2048×2048</span>
      <span class="sep" aria-hidden="true">·</span>
      <span id="statusLabel">就绪</span>
      <span class="sep" aria-hidden="true">·</span>
      <span id="versionLabel" class="version">v?</span>
    </div>

    <!-- HSV 浮动色板：点 activeSwatch / `C` 开关，拖标题栏移动，位置记忆到 localStorage -->
    <div id="colorPanel" class="float-panel hidden" role="dialog" aria-label="颜色">
      <div class="float-panel-head" id="colorPanelHead">
        <span class="float-panel-title">颜色</span>
        <button id="colorPanelClose" class="close-x" type="button" aria-label="关闭">×</button>
      </div>
      <div class="float-panel-body">
        <canvas id="svPad" class="sv-pad" width="240" height="180" aria-label="饱和度 / 明度面板"></canvas>
        <input id="hueSlider" type="range" min="0" max="360" step="1" value="0" aria-label="色相" class="hue-slider" />
        <div class="picker-row">
          <span id="previewSwatch" class="picker-preview"></span>
          <input id="hexInput" type="text" maxlength="9" value="#1b1b1b" aria-label="HEX" />
        </div>
      </div>
    </div>

    <!-- 清空确认 -->
    <div id="clearBackdrop" class="backdrop hidden" aria-hidden="true"></div>
    <div id="clearSheet" class="sheet hidden" role="dialog" aria-label="清空确认">
      <h3>清空画布？</h3>
      <p class="sheet-hint">一期没有持久化也没有撤销越界保护 —— 清空之后这张就空白了。</p>
      <button class="sheet-action danger" data-clear="confirm">清空</button>
      <button class="sheet-action ghost" data-clear="cancel">取消</button>
    </div>

    <!-- 更新 toast -->
    <div id="updateToast" class="toast hidden" role="status" aria-live="polite">
      <span>有新版本</span>
      <button id="updateToastReload" type="button">刷新</button>
      <button id="updateToastDismiss" type="button" class="dismiss" aria-label="忽略">×</button>
    </div>

    <!-- v15 起 entry 改成 dynamic import + ?v=VERSION，配合 SW 在响应 .js
         时改写 import URL，每次 bump 都让 WKWebView bytecode cache 失效 -->
    <script type="module">
      import(`./src/app.js?v=${window.WEBPAINT_VERSION || "dev"}`).catch((err) => {
        console.error("app boot failed", err);
        if (window.__wp_showFatal) window.__wp_showFatal(err.message || String(err));
      });
    </script>
  </body>
</html>
